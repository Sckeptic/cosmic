kind = "web"
previewPath = "/"
title = "A Love Site"
version = "1.0.0"
id = "artifacts/love-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18976

[services.development]
run = "pnpm --filter @workspace/love-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/love-site", "run", "build" ]
publicDir = "artifacts/love-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18976"
BASE_PATH = "/"
